<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!-- Om circle -->
  <circle cx="32" cy="32" r="28" fill="url(#grad1)"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Devanagari भ (Bha) -->
  <text x="32" y="42" text-anchor="middle" font-family="serif" font-size="26" fill="white" opacity="0.95">भ</text>
  <!-- Gradient def -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8534"/>
      <stop offset="100%" style="stop-color:#BF4E00"/>
    </linearGradient>
  </defs>
  <!-- BharatAI wordmark -->
  <text x="72" y="28" font-family="serif" font-size="28" font-weight="700" fill="#1C0E00" letter-spacing="0.5">Bharat</text>
  <text x="72" y="28" font-family="serif" font-size="28" font-weight="700" fill="#1C0E00" letter-spacing="0.5">
    <tspan fill="#E8650A" dx="140">AI</tspan>
  </text>
  <!-- Tagline -->
  <text x="73" y="48" font-family="sans-serif" font-size="11" fill="#9C7B58" letter-spacing="1.5">INTERACTIVE CLASSROOM</text>
</svg>
